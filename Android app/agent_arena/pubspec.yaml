name: agent_arena
description: "Agent Arena - Multi-agent AI debate platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.4.0
  uuid: ^4.4.0
  fl_chart: ^0.68.0
  google_fonts: ^6.3.3
  intl: ^0.19.0
  shimmer: ^3.0.0
  audioplayers: ^6.1.0
  cloud_firestore: ^4.17.5
  firebase_core: ^2.32.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/characters/
    - assets/sounds/
    - assets/effects/
